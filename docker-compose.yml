services:
  account-bot:
    image: dystian/bot-microsoft-account-account-bot:latest
    shm_size: '2gb'
    container_name: microsoft-account-bot
    restart: always
    network_mode: host
    env_file: .env
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
